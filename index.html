<script>
// ── TAB SWITCHING ────────────────────────────────────────────────────────────
function showTab(tab) {
  document.querySelectorAll('.ntab').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById('tab-' + tab).classList.add('active');
  document.getElementById('view-' + tab).classList.add('active');
  if (tab === 'systems') buildSysGuide();
}

// ── CONSTANTS ────────────────────────────────────────────────────────────────
const PAC2_REM = 180;

// ── CALCULATORS ──────────────────────────────────────────────────────────────
function calcUAE(p) {
  const d = DATA.uae, bm = d.inbound.bm.confirmed || 0, cm = d.inbound.cm.confirmed || 0, dro = d.inbound.drone.confirmed || 0;
  const spb = p.shots_per_bm, ubms = Math.round(bm * (1 - p.us_share));
  const tf = Math.min(p.thaad_ok, Math.round(ubms * 0.3)), tr = Math.max(0, p.thaad_ok - tf);
  const p3r = Math.max(0, p.pac3_stock - Math.round((ubms - tf) * spb) - Math.round(cm * 1.3));
  const bm_cap = Math.floor(tr + p3r / spb + 80 / 2.5);
  const di = Math.round(dro * 0.94), fh = Math.round(di * 0.65), gu = Math.min(365, Math.round((di - fh) * 1.1)), gr = Math.max(0, 365 - gu);
  const fr = Math.max(0, p.fighter_pre - Math.round(fh * p.aams_per_drone)), dfc = Math.floor(fr / p.aams_per_drone);
  return { bm_cap, thaad_rem: tr, pac3_rem: p3r, gnd_rem: gr, ftr_rem: fr, dr_cap: dfc + Math.floor(gr / 1.1), dr_cap_ftr: dfc, spb, us_share: p.us_share, aams: p.aams_per_drone, drones_int: di, dro };
}

function calcSaudi(p) {
  const d = DATA.saudi, bm = d.inbound.bm.est || 0, cm = d.inbound.cm.est || 0, dro = d.inbound.drone.est || 0;
  const spb = p.shots_per_bm, sbms = Math.round(bm * (1 - p.us_share));
  const tf = Math.min(p.thaad_ok, Math.round(sbms * 0.4)), tr = Math.max(0, p.thaad_ok - tf);
  const p3r = Math.max(0, p.pac3_stock - Math.round((sbms - tf) * spb) - Math.round(cm * 1.3));
  const bm_cap = Math.floor(tr + p3r / spb + 100 / 2.5);
  const di = Math.round(dro * 0.94), sh = Math.round(di * p.sh_frac), rem = di - sh;
  const cu = Math.min(p.crotale_stock, Math.round(rem * 0.35 * 1.1)), cr = Math.max(0, p.crotale_stock - cu);
  const fr = Math.max(0, p.fighter_pre - Math.round((rem - Math.floor(cu / 1.1))));
  const sh_cap = Math.round(p.sh_frac > 0 ? di * p.sh_frac * 2 : 0);
  return { bm_cap, thaad_rem: tr, pac3_rem: p3r, crotale_rem: cr, ftr_rem: fr, sh_frac: p.sh_frac, sh_cap, dr_cap: sh_cap + Math.floor(cr / 1.1) + fr, crotale_cap: Math.floor(cr / 1.1), ftr_cap: fr, spb, us_share: p.us_share, drones_int: di, dro };
}

function calcQatar(p) {
  const d = DATA.qatar, bm = d.inbound.bm.est || 0, cm = d.inbound.cm.est || 0, dro = d.inbound.drone.est || 0;
  const spb = p.shots_per_bm, qbms = Math.round(bm * (1 - p.us_share));
  const tf = Math.min(p.thaad_ok, Math.round(qbms * 0.35)), tr = Math.max(0, p.thaad_ok - tf);
  const p3r = Math.max(0, p.pac3_stock - Math.round((qbms - tf) * spb) - Math.round(cm * 1.3));
  const bm_cap = Math.round(tr + p3r / spb + PAC2_REM / 2.5);
  const di = Math.round(dro * 0.94);
  const ar = Math.max(0, p.aster_pre - Math.min(p.aster_pre, Math.round(di * 0.15)));
  const rr = Math.max(0, p.ram_pre - Math.min(p.ram_pre, Math.round(di * 0.10)));
  return { bm_cap, thaad_rem: tr, pac3_rem: p3r, pac2_rem: PAC2_REM, aster_rem: ar, ram_rem: rr, dr_cap: ar + rr, spb, us_share: p.us_share, drones_int: di, dro };
}

// ── SCENARIOS ─────────────────────────────────────────────────────────────────
const UAE_SC = {
  worst: { pac3_stock: 350, shots_per_bm: 3.0, us_share: 0.10, thaad_ok: 8,  fighter_pre: 1200, aams_per_drone: 1.2 },
  mid:   { pac3_stock: 450, shots_per_bm: 2.0, us_share: 0.25, thaad_ok: 20, fighter_pre: 1400, aams_per_drone: 1.0 },
  best:  { pac3_stock: 420, shots_per_bm: 1.8, us_share: 0.45, thaad_ok: 50, fighter_pre: 1400, aams_per_drone: 0.95 },
};
const KSA_SC = {
  worst: { pac3_stock: 400, shots_per_bm: 2.5, us_share: 0.10, thaad_ok: 20, fighter_pre: 2000, sh_frac: 0.00, crotale_stock: 150 },
  mid:   { pac3_stock: 520, shots_per_bm: 2.0, us_share: 0.30, thaad_ok: 35, fighter_pre: 2800, sh_frac: 0.08, crotale_stock: 240 },
  best:  { pac3_stock: 650, shots_per_bm: 1.6, us_share: 0.50, thaad_ok: 48, fighter_pre: 3500, sh_frac: 0.25, crotale_stock: 320 },
};
const QAT_SC = {
  worst: { pac3_stock: 400, shots_per_bm: 2.5, us_share: 0.10, thaad_ok: 0,  aster_pre: 25, ram_pre: 35 },
  mid:   { pac3_stock: 550, shots_per_bm: 2.0, us_share: 0.25, thaad_ok: 16, aster_pre: 42, ram_pre: 70 },
  best:  { pac3_stock: 680, shots_per_bm: 1.8, us_share: 0.40, thaad_ok: 32, aster_pre: 62, ram_pre: 95 },
};

// ── SLIDERS ── all lo=bad/red, hi=good/green, right=better ───────────────────
// For "worse when higher" params (shots_per_bm, aams_per_drone) we store the
// INVERSE as the slider value so right=better still holds.
const UAE_SL = [
  { key: 'pac3_stock',  label: 'PAC-3 stock pre-war',                  lo: 350,  hi: 500,  mid: 450,  step: 10,   toP: v => v,   fmt: v => Math.round(v) + ' rds',        hint: 'Only 452 ever DSCA-approved for UAE.' },
  { key: 'pac3_eff',    label: 'PAC-3 rounds needed per BM kill',       lo: 0.33, hi: 0.56, mid: 0.50, step: 0.01, toP: v => 1/v, fmt: v => (1/v).toFixed(1) + ' rds/BM',  hint: 'Slider right = more efficient. Standard = 2 rds/BM (0.50).' },
  { key: 'us_share',    label: 'Share of BM intercepts by US systems',  lo: 0.10, hi: 0.45, mid: 0.25, step: 0.05, toP: v => v,   fmt: v => Math.round(v * 100) + '%',       hint: 'Higher = less draw on UAE sovereign stocks.' },
  { key: 'thaad_ok',    label: 'THAAD rounds fired before radar lost',  lo: 8,    hi: 50,   mid: 20,   step: 1,    toP: v => v,   fmt: v => Math.round(v) + ' rds',         hint: 'Both UAE THAAD sites damaged. 96 rounds pre-crisis.' },
  { key: 'fighter_pre', label: 'Air-to-air missiles held pre-war',      lo: 1200, hi: 1400, mid: 1400, step: 50,   toP: v => v,   fmt: v => Math.round(v) + ' rds',         hint: 'AIM-120 + AIM-9 (F-16s), MICA (Mirages).' },
  { key: 'drone_eff',   label: 'Air-to-air missiles per drone kill',    lo: 0.71, hi: 1.25, mid: 1.0,  step: 0.05, toP: v => 1/v, fmt: v => (1/v).toFixed(2) + ' per kill', hint: 'Right = fewer missiles per kill. Cannon kills use zero.' },
];
const KSA_SL = [
  { key: 'pac3_stock',  label: 'PAC-3 stock pre-war',                   lo: 400,  hi: 650,  mid: 520,  step: 10,   toP: v => v,   fmt: v => Math.round(v) + ' rds',           hint: '2014+2015 deliveries ~520 confirmed. Jan 2026 order of 730 NOT yet delivered.' },
  { key: 'pac3_eff',    label: 'PAC-3 rounds needed per BM kill',        lo: 0.40, hi: 0.63, mid: 0.50, step: 0.01, toP: v => 1/v, fmt: v => (1/v).toFixed(1) + ' rds/BM',    hint: 'Saudi has Houthi combat experience. Right = fewer rounds wasted.' },

function bcol(p) { return p <= 20 ? 'var(--red)' : p <= 50 ? 'var(--amber)' : 'var(--green)'; }
const SL = { critical: 'CRITICAL', strained: 'STRAINED', adequate: 'ADEQUATE' };
const SC = { critical: 'badge badge-crit', strained: 'badge badge-str', adequate: 'badge badge-adeq' };

function getScen(id, sk) {
  if (id === 'uae')   return calcUAE(UAE_SC[sk]);
  if (id === 'saudi') return calcSaudi(KSA_SC[sk]);
  if (id === 'qatar') return calcQatar(QAT_SC[sk]);

// ── CARDS ─────────────────────────────────────────────────────────────────────
function renderCards() {
  const c = document.getElementById('card-container');
  c.innerHTML = Object.entries(DATA).map(([id, d]) => {
    const bms = d.bm_status || d.status, drs = d.drone_status || d.status;
    const sg = '<div class="scen-grid">' + ['worst', 'mid', 'best'].map(sk => {
      const r = getScen(id, sk);
      return `<div class="sg-col ${sk}"><div class="sg-lbl">${sk === 'mid' ? 'Est.' : sk[0].toUpperCase() + sk.slice(1)}</div><div class="sg-bm">~${r.bm_cap}</div><div class="sg-sub">BMs</div><div class="sg-dr">~${r.dr_cap}</div><div class="sg-sub">Drones†</div></div>`;
    }).join('') + '</div>';
    return `<div class="card" data-id="${id}">
      <div class="card-head">
        <div style="display:flex;align-items:center"><span class="card-flag">${d.flag}</span><div><div class="card-name">${d.name}</div><div class="card-hint">Click for detail &amp; assumptions</div></div></div>
        <div style="display:flex;flex-direction:column;gap:4px;align-items:flex-end"><span class="${SC[bms]}">🚀 ${SL[bms]}</span><span class="${SC[drs]}">✈ ${SL[drs]}</span></div>
      </div>
      ${sg}
      <div class="card-jet-note">† ${JET_NOTES[id]}</div>
      <div class="card-foot"><div class="card-conf">Data: ${d.inbound.bm.conf || 'est.'}</div><div class="card-cta">Detail →</div></div>
    </div>`;
  }).join('');
  c.querySelectorAll('.card').forEach(el => el.addEventListener('click', () => showDetail(el.dataset.id)));
}

// ── DETAIL VIEW ───────────────────────────────────────────────────────────────
function showDetail(id) {
  const d = DATA[id];
  document.getElementById('det-flag').textContent = d.flag;
  document.getElementById('det-name').textContent = d.name;
  document.getElementById('det-sub').textContent = d.sub || '';
  const bms = d.bm_status || d.status, drs = d.drone_status || d.status;
  document.getElementById('det-badges').innerHTML = `<span class="${SC[bms]}">🚀 ${SL[bms]}</span><span class="${SC[drs]}">✈ ${SL[drs]}</span>`;

  // Build body HTML (hero + sliders + accordions)
  const sls = id === 'uae' ? UAE_SL : id === 'saudi' ? KSA_SL : QAT_SL;
  const cv  = id === 'uae' ? UAE_CV : id === 'saudi' ? KSA_CV : QAT_CV;
  const calc = id === 'uae' ? () => calcUAE(uaeP()) : id === 'saudi' ? () => calcSaudi(ksaP()) : () => calcQatar(qatP());

  let heroHtml = '';
  if (id === 'uae')   heroHtml = buildUAEHero(calc());
  if (id === 'saudi') heroHtml = buildSaudiHero(calc());
  if (id === 'qatar') heroHtml = buildQatarHero(calc());

  document.getElementById('det-body').innerHTML = heroHtml + buildSliders(sls, cv) + buildInbound(d) + buildSystems(d);

  // Attach slider events AFTER innerHTML is set
  sls.forEach(s => {
    const sl = document.getElementById('sl-' + s.key);
    const vl = document.getElementById('sl-val-' + s.key);
    if (!sl) return;
    sl.addEventListener('input', () => {
      cv[s.key] = parseFloat(sl.value);
      if (vl) vl.textContent = s.fmt(cv[s.key]);
      updateHero(id);
    });
  });

  // Reset button
  const rb = document.getElementById('reset-btn');
  if (rb) rb.addEventListener('click', () => {
    sls.forEach(s => {
      cv[s.key] = s.mid;
      const sl = document.getElementById('sl-' + s.key);
      const vl = document.getElementById('sl-val-' + s.key);
      if (sl) sl.value = s.mid;
      if (vl) vl.textContent = s.fmt(s.mid);
    });
    updateHero(id);
  });

  // Accordion toggles
  document.querySelectorAll('.acc-hdr').forEach(h => h.addEventListener('click', () => {
    h.nextElementSibling.classList.toggle('open');
    const a = h.querySelector('.acc-arr');
    if (a) a.classList.toggle('open');
  }));

  document.getElementById('view-list').style.display = 'none';
  document.getElementById('view-detail').style.display = 'block';
}

function updateHero(id) {
  const set = (eid, v) => { const el = document.getElementById(eid); if (el) el.textContent = v; };
  if (id === 'uae') {
    const r = calcUAE(uaeP());
    set('h-bm', '~' + r.bm_cap);
    set('h-bm-r', 'range ' + Math.round(r.bm_cap * .75) + '–' + Math.round(r.bm_cap * 1.3));
    set('h-thaad', '~' + r.thaad_rem + ' rds');
    set('h-pac3', r.pac3_rem === 0 ? 'EXHAUSTED' : '~' + r.pac3_rem + ' rds → ~' + Math.floor(r.pac3_rem / r.spb) + ' BMs');
    set('h-bm-note', '@ ' + r.spb.toFixed(1) + ' rds/BM · US covers ' + Math.round(r.us_share * 100) + '% of intercepts');
    set('h-dr', '~' + r.dr_cap);
    set('h-dr-r', 'range ' + Math.round(r.dr_cap * .75) + '–' + Math.round(r.dr_cap * 1.3));

    set('h-crotale', '~' + r.crotale_rem + ' rds → ~' + r.crotale_cap + ' kills');
    set('h-ftr', '~' + r.ftr_rem + ' air-to-air missiles → ~' + r.ftr_cap + ' kills');
  } else if (id === 'qatar') {
    const r = calcQatar(qatP());
    set('h-bm', '~' + r.bm_cap);
    set('h-bm-r', 'range ' + Math.round(r.bm_cap * .75) + '–' + Math.round(r.bm_cap * 1.3));
    set('h-thaad', r.thaad_rem === 0 ? 'EXHAUSTED' : '~' + r.thaad_rem + ' rds');

    set('h-bm-note', '@ ' + r.spb.toFixed(1) + ' rds/BM · US covers ' + Math.round(r.us_share * 100) + '% of intercepts');
    set('h-dr', '~' + r.dr_cap);

    set('h-aster', '~' + r.aster_rem + ' rds');

  }

// ── SLIDER PANEL ──────────────────────────────────────────────────────────────
function buildSliders(sls, cv) {
  const rows = sls.map(s => `<div class="asl-row">
    <div class="asl-lbl" title="${s.hint || ''}">${s.label}</div>
    <input type="range" class="asl-sl" id="sl-${s.key}" min="${s.lo}" max="${s.hi}" step="${s.step}" value="${cv[s.key]}">
    <div class="asl-val" id="sl-val-${s.key}">${s.fmt(cv[s.key])}</div>
  </div>`).join('');
  return `<div class="sliders-panel">
    <div class="sliders-title">
      <div class="sliders-lbl">📐 Assumptions — slide right for better outcome</div>
      <button class="reset-btn" id="reset-btn">Reset</button>
    </div>${rows}
  </div>`;
}

// ── INBOUND + SYSTEMS ACCORDIONS ──────────────────────────────────────────────
function buildInbound(d) {
  const mk = (t, cls, dt) => `<div class="ib-block"><div class="ib-blk-title ${cls}">${t}</div>${(dt.rows || []).map(r => `<div class="ib-row-d"><span class="ib-row-k">${r[0]}</span><span class="ib-row-v">${r[1]}</span></div>`).join('')}<div style="font-size:8px;color:var(--muted);margin-top:4px">Conf: ${dt.conf || '?'}</div></div>`;
  const bm = d.inbound.bm, cm = d.inbound.cm, dr = d.inbound.drone;
  const tot = (bm.confirmed || bm.est || 0) + (cm.confirmed || cm.est || 0) + (dr.confirmed || dr.est || 0);
  return `<div class="acc"><div class="acc-hdr"><div class="acc-title-row"><span class="acc-num">01</span><span class="acc-title">Inbound — what Iran fired</span></div><div style="display:flex;gap:8px;align-items:center"><span class="acc-sum">~${tot.toLocaleString()} total</span><span class="acc-arr">▼</span></div></div><div class="acc-body open"><div class="ib-grid">${mk('Ballistic missiles', 'ibt-bm', bm)}${mk('Cruise missiles', 'ibt-cm', cm)}${mk('Drones / Shaheds', 'ibt-dr', dr)}</div><div class="src-note">Source: ${bm.source || '—'}</div></div></div>`;
}

function buildSystems(d) {
  const rows = d.systems.map(s => {
    const p = s.pct || 0, c = bcol(p);
    const isSep = s.conf === 'separate', isUnconf = s.conf === 'unconfirmed';
    const r = isSep ? 'see jets note' : isUnconf ? 'unconfirmed' : (s.lo === 0 && s.hi === 0 ? 'EXHAUSTED' : (s.lo !== null ? s.lo + '–' + s.hi : '—'));
    const bar = isSep || isUnconf ? `<span style="font-size:9px;color:var(--muted)">${isSep ? 'separate' : 'not modelled'}</span>` : `<div class="bar-wrap"><div class="bar-track"><div class="bar-fill" style="width:${p}%;background:${c}"></div></div><span style="font-size:9px;color:${c};font-family:var(--mono)">${p}%</span></div>`;
    return `<tr><td><div class="sys-nm">${s.nm}</div><div class="sys-rl">${s.rl}</div></td><td style="font-family:var(--mono);font-size:11px">${s.pre || '—'}</td><td style="color:${c};font-family:var(--mono);font-size:11px">${r}</td><td>${bar}</td><td style="font-size:9px;color:var(--muted)">${s.conf}</td></tr>`;
  }).join('');
  const crits = d.systems.filter(s => s.pct <= 20 && s.conf !== 'separate' && s.conf !== 'unconfirmed').map(s => s.nm).join(', ');
  return `<div class="acc"><div class="acc-hdr"><div class="acc-title-row"><span class="acc-num">02</span><span class="acc-title">Interceptor capacity remaining</span></div><div style="display:flex;gap:8px;align-items:center"><span class="acc-sum">${crits ? 'Critical: ' + crits : 'See breakdown'}</span><span class="acc-arr open">▼</span></div></div><div class="acc-body open"><table class="sys-tbl"><thead><tr><th>System</th><th>Pre-crisis</th><th>Remaining</th><th>%</th><th>Conf</th></tr></thead><tbody>${rows}</tbody></table><div class="warn" style="margin-top:12px">⚠ Analyst estimates only. No confirmed stockpile figures in public domain.</div></div></div>`;
}

function buildSysGuide() {
  const el = document.getElementById('sys-content');
  if (el.dataset.built) return;
  el.dataset.built = '1';
  const TM = { BM: 'tc-bm', CM: 'tc-cm', Drone: 'tc-drone', UAV: 'tc-uav', Acft: 'tc-acft' };
  const TL = { BM: '🚀 Ballistic', CM: '✈ Cruise', Drone: '🛸 Shahed', UAV: '🛸 UAV', Acft: '✈ Aircraft' };
  let html = '';
  Object.entries(SYSDATA).forEach(([sec, syss]) => {
    html += `<div class="sys-section"><div class="sys-sec-hdr">${sec}</div><div class="sys-grid">`;
    syss.forEach(s => {
      const chips = s.tgts.map(t => `<span class="tc ${TM[t]}">${TL[t]}</span>`).join('');
      const ops = s.ops.map(o => `<div class="op-tag">${o.f} <span>${o.n}</span>${o.s === 'critical' ? '<span class="op-s op-sc">CRIT</span>' : o.s === 'strained' ? '<span class="op-s op-ss">STR</span>' : ''}</div>`).join('');
      html += `<div class="sc">
        <div class="sc-head">
          <div class="sc-top"><div><div class="sc-name">${s.nm}</div><div class="sc-aka">${s.aka}</div></div><div class="sc-cost">${s.cost}</div></div>
          <div class="tcs">${chips}</div>
        </div>
        <div class="sc-body">
          <div class="sc-stats">
            <div class="sc-stat"><div class="sc-stat-v">${s.range}</div><div class="sc-stat-l">Range</div></div>
            <div class="sc-stat"><div class="sc-stat-v">${s.spd}</div><div class="sc-stat-l">Speed</div></div>
          </div>
          <div class="sc-desc">${s.desc}</div>
          <div class="ops-row">${ops}</div>
          ${s.note ? `<div class="sc-note">${s.note}</div>` : ''}
        </div>
      </div>`;
    });
    html += '</div></div>';
  });
  el.innerHTML = html;
}
